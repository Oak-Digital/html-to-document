name: CI

on:
  push:
    branches: [main, oak-main]
  pull_request:
    branches: [main, oak-main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test
